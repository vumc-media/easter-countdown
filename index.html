<div id="vumc-worship-countdown">

  <div class="wc-service" id="wc-service-label">
    Easter Worship Begins In
  </div>

  <div class="wc-datetime">
    Sunday April 5, 2026 • 10:30 AM
  </div>

  <a id="wc-live-button"
     class="wc-live-btn"
     href="https://live.versaillesumc.org"
     target="_blank"
     rel="noopener"
     style="display:none;">
     <span class="wc-live-dot"></span>
     LIVE — WATCH NOW
  </a>

  <div class="wc-timer" id="wc-timer">
    <div class="wc-box">
      <span id="wc-days">0</span>
      <small>DAYS</small>
    </div>
    <div class="wc-box">
      <span id="wc-hours">0</span>
      <small>HOURS</small>
    </div>
    <div class="wc-box">
      <span id="wc-minutes">0</span>
      <small>MINUTES</small>
    </div>
    <div class="wc-box">
      <span id="wc-seconds">0</span>
      <small>SECONDS</small>
    </div>
  </div>

</div>

<style>
#vumc-worship-countdown{
  width:100%;
  text-align:center;
  font-family:Arial, Helvetica, sans-serif;
  padding:10px 0 12px;
  background:transparent !important;
}

/* 🔥 STRONGER TITLE */
.wc-service{
  font-size:30px;
  color:#ffffff;
  text-shadow:
    0 0 8px rgba(0,0,0,.9),
    0 0 18px rgba(0,0,0,.75),
    0 2px 10px rgba(0,0,0,.9);
  margin-bottom:6px;
  font-weight:900;
  letter-spacing:.5px;
}

/* 📅 DATE + TIME */
.wc-datetime{
  font-size:16px;
  color:#ffffff;
  text-shadow:0 2px 6px rgba(0,0,0,.75);
  margin-bottom:16px;
  font-weight:600;
}

.wc-timer{
  display:flex;
  justify-content:center;
  gap:14px;
  flex-wrap:wrap;
  background:transparent !important;
}

.wc-box{
  background:rgba(255,255,255,.92);
  color:#000000;
  min-width:110px;
  padding:18px 14px;
  border-radius:14px;
  box-shadow:0 10px 25px rgba(0,0,0,.28);
  backdrop-filter:blur(2px);
}

.wc-box span{
  display:block;
  font-size:44px;
  font-weight:900;
  margin-bottom:6px;
}

.wc-box small{
  font-size:13px;
  letter-spacing:1px;
  font-weight:700;
}

.wc-live-btn{
  display:inline-flex;
  align-items:center;
  gap:10px;
  background:rgba(255,255,255,.95);
  color:#000000;
  padding:14px 28px;
  border-radius:999px;
  text-decoration:none;
  font-size:20px;
  font-weight:900;
  border:2px solid #d4af37;
  box-shadow:0 10px 25px rgba(0,0,0,.28);
  animation:livePulse 1.6s infinite ease-in-out;
}

.wc-live-dot{
  width:12px;
  height:12px;
  border-radius:50%;
  background:#d60000;
  box-shadow:0 0 10px rgba(255,0,0,.7);
}

@keyframes livePulse{
  0%{transform:scale(1);}
  50%{transform:scale(1.04);}
  100%{transform:scale(1);}
}

@media (max-width:600px){
  #vumc-worship-countdown{
    display:none !important;
  }
}
</style>

<script>
(function(){

const TZ = "America/New_York";

const dEl = document.getElementById("wc-days");
const hEl = document.getElementById("wc-hours");
const mEl = document.getElementById("wc-minutes");
const sEl = document.getElementById("wc-seconds");

const labelEl = document.getElementById("wc-service-label");
const timerEl = document.getElementById("wc-timer");
const liveBtn = document.getElementById("wc-live-button");

function parts(date){
  const p = new Intl.DateTimeFormat("en-US", {
    timeZone: TZ,
    year: "numeric",
    month: "numeric",
    day: "numeric",
    hour: "numeric",
    minute: "numeric",
    second: "numeric",
    hour12: false,
    weekday: "short"
  }).formatToParts(date);

  const m = {};
  p.forEach(x => { if (x.type !== "literal") m[x.type] = x.value });

  return {
    y:+m.year, mo:+m.month, d:+m.day,
    h:+m.hour, mi:+m.minute, s:+m.second, w:m.weekday
  };
}

function zonedUTC(y,mo,d,h,mi,s){
  const guess=new Date(Date.UTC(y,mo-1,d,h,mi,s));
  const z=parts(guess);
  const shown=Date.UTC(z.y,z.mo-1,z.d,z.h,z.mi,z.s);
  const want=Date.UTC(y,mo-1,d,h,mi,s);
  return new Date(guess.getTime()+(want-shown));
}

function addDays(y,mo,d,a){
  const dt=new Date(Date.UTC(y,mo-1,d+a));
  return{y:dt.getUTCFullYear(),mo:dt.getUTCMonth()+1,d:dt.getUTCDate()};
}

function state(){
  const now=new Date();
  const z=parts(now);
  const mins=z.h*60+z.mi;

  const serviceStart=10*60+30;
  const reset=12*60;

  if(z.w==="Sun"){
    if(mins<serviceStart){
      return{mode:"count",target:zonedUTC(z.y,z.mo,z.d,10,30,0)};
    }

    if(mins>=serviceStart && mins<reset){
      return{mode:"live",label:"Easter Worship is live now"};
    }

    if(mins>=reset){
      const ns=addDays(z.y,z.mo,z.d,7);
      return{mode:"count",target:zonedUTC(ns.y,ns.mo,ns.d,10,30,0)};
    }
  }

  const map={Sun:0,Mon:1,Tue:2,Wed:3,Thu:4,Fri:5,Sat:6};
  let days=(7-map[z.w])%7;
  if(days===0) days=7;

  const ns=addDays(z.y,z.mo,z.d,days);
  return{mode:"count",target:zonedUTC(ns.y,ns.mo,ns.d,10,30,0)};
}

function tick(){
  const st=state();

  if(st.mode==="live"){
    labelEl.textContent=st.label;
    timerEl.style.display="none";
    liveBtn.style.display="inline-flex";
    return;
  }

  labelEl.textContent="Easter Worship Begins In";
  liveBtn.style.display="none";
  timerEl.style.display="flex";

  const diff=st.target-new Date();
  const total=Math.max(0,Math.floor(diff/1000));

  dEl.textContent=Math.floor(total/86400);
  hEl.textContent=String(Math.floor((total%86400)/3600)).padStart(2,"0");
  mEl.textContent=String(Math.floor((total%3600)/60)).padStart(2,"0");
  sEl.textContent=String(total%60).padStart(2,"0");
}

tick();
setInterval(tick,1000);

})();
</script>
